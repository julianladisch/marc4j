name: CI
on: workflow_dispatch
jobs:
  Test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Install JDK
        uses: actions/setup-java@v1.4.3
        with:
          java-version: '8'
      - name: Run tests
        run: ant test
